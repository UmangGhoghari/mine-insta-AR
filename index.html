<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Menu - WebXR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            width: 100vw;
            height: 100vh;
        }

        /* LAYER 1: Camera video - bottom layer */
        #camera-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Mirror for front camera feel - remove if using back camera */
            /* transform: scaleX(-1); */
            display: block;
            background: #000;
        }

        /* LAYER 2: A-Frame scene - must be transparent over video */
        a-scene {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 2 !important;
            background: transparent !important;
        }

        /* Make A-Frame canvas transparent */
        a-scene canvas {
            background: transparent !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 2 !important;
        }

        /* LAYER 3: UI overlays */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-text {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding: 0 24px;
            margin-bottom: 10px;
        }
        #loading-subtext {
            color: rgba(255,255,255,0.8);
            font-size: 15px;
            text-align: center;
            padding: 0 24px;
        }

        /* Hint bar */
        #hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(102,126,234,0.92) 0%, rgba(118,75,162,0.92) 100%);
            color: #fff;
            padding: 12px 22px;
            border-radius: 25px;
            font-size: 15px;
            z-index: 999;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            white-space: nowrap;
            pointer-events: none;
        }

        /* Controls panel */
        #controls {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.72);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 999;
            pointer-events: none;
        }
        .control-item {
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item:last-child { margin-bottom: 0; }

        /* Error / status toast */
        #status-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220,53,69,0.93);
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 10000;
            text-align: center;
            display: none;
            max-width: 88vw;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }
        #status-toast.success { background: rgba(25,135,84,0.93); }

        /* Gesture indicator */
        #gesture-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #00ff88;
            font-size: 20px;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 14px;
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #gesture-badge.show { opacity: 1; }

        /* Camera permission button */
        #cam-btn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9998;
            display: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.3);
        }
        #cam-btn:active { transform: translateX(-50%) scale(0.97); }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">🚀 AR Menu Loading...</div>
        <div id="loading-subtext">Starting camera & AR scene...</div>
    </div>

    <!-- Status Toast -->
    <div id="status-toast"></div>

    <!-- Gesture Badge -->
    <div id="gesture-badge"></div>

    <!-- LAYER 1: Camera video feed -->
    <video id="camera-video" autoplay muted playsinline></video>

    <!-- Manual camera start button (fallback) -->
    <button id="cam-btn" onclick="window.arApp && window.arApp.requestCameraManually()">
        📷 Tap to Enable Camera
    </button>

    <!-- LAYER 2: A-Frame AR scene (transparent) -->
    <a-scene
        id="ar-scene"
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
        background="color: transparent"
        embedded>

        <a-assets timeout="15000">
            <img id="menu-image" src="./menu-image.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- Entity camera - no look controls, locked -->
        <a-entity camera position="0 0 0" look-controls="enabled: false"></a-entity>

        <!-- Main menu image card -->
        <a-image
            id="menu-card"
            src="#menu-image"
            position="0 0 -2.2"
            width="1.4"
            height="1.9"
            material="transparent: false; shader: flat;"
            animation__float="property: position; from: 0 -0.05 -2.2; to: 0 0.05 -2.2; dir: alternate; dur: 3200; easing: easeInOutSine; loop: true">
        </a-image>

        <!-- Gesture feedback text in 3D space -->
        <a-entity id="gesture-text-3d" position="0 1.4 -2.2" visible="false">
            <a-text id="gesture-text-val"
                value="Gesture!"
                color="#00ff88"
                width="5"
                align="center"
                font="mozillavr"
                scale="0.7 0.7 0.7">
            </a-text>
        </a-entity>

    </a-scene>

    <!-- LAYER 3: UI controls -->
    <div id="controls">
        <div class="control-item"><span>👆</span><span>Keys 1–4 / drag</span></div>
        <div class="control-item"><span>🖱️</span><span>Drag to move</span></div>
        <div class="control-item"><span>⚙️</span><span>Scroll to zoom</span></div>
        <div class="control-item"><span>🔄</span><span>Key R to reset</span></div>
    </div>

    <div id="hint">📋 AR Menu Active! Drag the card, scroll to zoom!</div>

    <script>
    // ─── Transparent A-Frame Renderer Fix ───────────────────────────────────────
    // Hook into A-Frame BEFORE the scene initializes so we can patch the WebGL
    // clear color to transparent (0,0,0,0) — this is the key fix for the white screen.
    AFRAME.registerComponent('transparent-bg', {
        init: function () {
            const renderer = this.el.renderer;
            if (renderer) {
                renderer.setClearColor(0x000000, 0);   // alpha = 0 → fully transparent
                renderer.autoClear = true;
            }
        }
    });

    // ─── Main AR App ─────────────────────────────────────────────────────────────
    class ARMenuApp {
        constructor() {
            this.scene       = document.getElementById('ar-scene');
            this.menuCard    = document.getElementById('menu-card');
            this.video       = document.getElementById('camera-video');
            this.loadingEl   = document.getElementById('loading-screen');
            this.toast       = document.getElementById('status-toast');
            this.badge       = document.getElementById('gesture-badge');
            this.camBtn      = document.getElementById('cam-btn');
            this.gestureText = document.getElementById('gesture-text-3d');
            this.gestureVal  = document.getElementById('gesture-text-val');

            this.stream       = null;
            this.isDragging   = false;
            this.prevMouse    = { x: 0, y: 0 };
            this.prevTouch    = null;
            this.pinchDist    = null;

            window.arApp = this;
            this.init();
        }

        async init() {
            // Add transparent-bg component to scene
            this.scene.setAttribute('transparent-bg', '');

            // Also patch renderer after scene loads as a safety net
            this.scene.addEventListener('loaded', () => {
                this.patchRenderer();
                console.log('[AR] Scene loaded OK');
            });

            // Attempt camera
            const cameraOk = await this.startCamera();

            if (!cameraOk) {
                // Show manual button
                this.camBtn.style.display = 'block';
            }

            this.setupControls();
            this.hideLoading();
        }

        // ── Patch Three.js / A-Frame renderer for transparent canvas ──────────
        patchRenderer() {
            try {
                const renderer = this.scene.renderer;
                if (renderer) {
                    renderer.setClearColor(0x000000, 0);
                    renderer.setClearAlpha(0);
                    console.log('[AR] Renderer patched – canvas transparent');
                }
                // Also try through Three.js scene
                if (this.scene.object3D) {
                    this.scene.object3D.background = null;
                }
            } catch(e) {
                console.warn('[AR] Renderer patch error:', e);
            }
        }

        // ── Camera ────────────────────────────────────────────────────────────
        async startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                this.showToast('⚠️ Camera API not available in this browser.', false);
                return false;
            }

            const constraints = [
                // Try back camera first (best for AR)
                { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                // Fallback: any camera
                { video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                // Minimal fallback
                { video: true, audio: false }
            ];

            for (const constraint of constraints) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(constraint);
                    this.stream = stream;
                    this.video.srcObject = stream;

                    await new Promise((resolve, reject) => {
                        const t = setTimeout(() => resolve(), 4000); // timeout ok
                        this.video.onloadedmetadata = () => { clearTimeout(t); resolve(); };
                        this.video.onerror = (e) => { clearTimeout(t); reject(e); };
                    });

                    await this.video.play().catch(() => {
                        console.warn('[AR] Autoplay blocked – waiting for user gesture');
                    });

                    console.log('[AR] Camera started:', stream.getVideoTracks()[0]?.label);
                    this.showToast('📷 Camera ready!', true);
                    setTimeout(() => this.hideToast(), 2500);
                    return true;

                } catch (err) {
                    console.warn('[AR] Camera attempt failed:', err.name, err.message);
                }
            }

            // All attempts failed
            if (this.stream === null) {
                this.showToast('📷 Camera blocked. Tap the button below to try again.', false);
                return false;
            }
        }

        async requestCameraManually() {
            this.camBtn.style.display = 'none';
            const ok = await this.startCamera();
            if (!ok) this.camBtn.style.display = 'block';
        }

        // ── Keyboard, mouse, touch controls ──────────────────────────────────
        setupControls() {
            // ── Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                switch(e.key.toLowerCase()) {
                    case '1': this.moveCard(-0.15, 0, 0); this.showBadge('⬅️ Move Left');  break;
                    case '2': this.moveCard( 0.15, 0, 0); this.showBadge('➡️ Move Right'); break;
                    case '3': this.scaleCard(1.12);        this.showBadge('🔍 Zoom In');   break;
                    case '4': this.scaleCard(0.88);        this.showBadge('🔎 Zoom Out');  break;
                    case 'r': this.resetCard();             this.showBadge('🔄 Reset');     break;
                    case 'arrowleft':  this.rotateCard(-10); this.showBadge('↩️ Rotate L'); break;
                    case 'arrowright': this.rotateCard( 10); this.showBadge('↪️ Rotate R'); break;
                }
            });

            // ── Mouse drag on the scene canvas
            const canvas = this.scene.canvas || document.querySelector('a-scene canvas') || document;

            const getEventTarget = () => document;

            getEventTarget().addEventListener('mousedown', (e) => {
                this.isDragging = true;
                this.prevMouse = { x: e.clientX, y: e.clientY };
            });

            getEventTarget().addEventListener('mousemove', (e) => {
                if (!this.isDragging) return;
                const dx = e.clientX - this.prevMouse.x;
                const dy = e.clientY - this.prevMouse.y;
                this.moveCard(dx * 0.006, -dy * 0.006, 0);
                this.prevMouse = { x: e.clientX, y: e.clientY };
            });

            getEventTarget().addEventListener('mouseup',   () => { this.isDragging = false; });
            getEventTarget().addEventListener('mouseleave',() => { this.isDragging = false; });

            // ── Mouse wheel zoom
            document.addEventListener('wheel', (e) => {
                e.preventDefault();
                this.scaleCard(e.deltaY > 0 ? 0.93 : 1.07);
            }, { passive: false });

            // ── Touch drag (mobile)
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    this.prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    this.pinchDist = null;
                } else if (e.touches.length === 2) {
                    this.pinchDist = this.getTouchDist(e.touches);
                    this.prevTouch = null;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && this.prevTouch) {
                    const dx = e.touches[0].clientX - this.prevTouch.x;
                    const dy = e.touches[0].clientY - this.prevTouch.y;
                    this.moveCard(dx * 0.006, -dy * 0.006, 0);
                    this.prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else if (e.touches.length === 2 && this.pinchDist !== null) {
                    const newDist = this.getTouchDist(e.touches);
                    const factor = newDist / this.pinchDist;
                    // clamp factor to avoid wild jumps
                    const clamped = Math.max(0.85, Math.min(1.15, factor));
                    this.scaleCard(clamped);
                    this.pinchDist = newDist;
                }
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', () => {
                this.prevTouch = null;
                this.pinchDist = null;
            });
        }

        getTouchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx*dx + dy*dy);
        }

        // ── Card manipulation helpers ─────────────────────────────────────────
        moveCard(x, y, z) {
            const pos = this.menuCard.getAttribute('position');
            this.menuCard.setAttribute('position', {
                x: pos.x + x,
                y: pos.y + y,
                z: pos.z + z
            });
        }

        scaleCard(factor) {
            let s = this.menuCard.getAttribute('scale') || { x: 1, y: 1, z: 1 };
            const nx = Math.max(0.2, Math.min(4, s.x * factor));
            const ny = Math.max(0.2, Math.min(4, s.y * factor));
            this.menuCard.setAttribute('scale', { x: nx, y: ny, z: 1 });
        }

        rotateCard(deg) {
            const rot = this.menuCard.getAttribute('rotation');
            this.menuCard.setAttribute('rotation', { x: rot.x, y: rot.y + deg, z: rot.z });
        }

        resetCard() {
            this.menuCard.setAttribute('position', '0 0 -2.2');
            this.menuCard.setAttribute('rotation', '0 0 0');
            this.menuCard.setAttribute('scale',    '1 1 1');
        }

        // ── UI helpers ────────────────────────────────────────────────────────
        showBadge(text) {
            this.badge.textContent = text;
            this.badge.classList.add('show');
            clearTimeout(this._badgeTimer);
            this._badgeTimer = setTimeout(() => this.badge.classList.remove('show'), 1800);
        }

        showToast(msg, success = false) {
            this.toast.textContent = msg;
            this.toast.className   = success ? 'success' : '';
            this.toast.style.display = 'block';
        }

        hideToast() {
            this.toast.style.display = 'none';
        }

        hideLoading() {
            setTimeout(() => {
                this.loadingEl.classList.add('hidden');
            }, 900);
        }
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    // Wait for A-Frame to be ready before we boot the app
    function boot() {
        // Ensure A-Frame custom element is defined before booting
        if (typeof AFRAME !== 'undefined') {
            new ARMenuApp();
        } else {
            window.addEventListener('load', () => new ARMenuApp());
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
    } else {
        boot();
    }
    </script>

</body>
</html>
