<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Menu</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            color: #fff;
            font-size: 20px;
            text-align: center;
            margin-top: 20px;
            padding: 0 30px;
        }
        #hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">📷 Camera load ho raha hai...</div>
    </div>

    <div id="hint">📋 Menu dekh rahe ho! Ghoomao aur zoom karo!</div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        id="scene">

        <a-assets timeout="10000">
            <img id="menu-image"
                src="https://raw.githubusercontent.com/UmangGhoghari/mine-insta-AR/main/menu-image.jpg"
                crossorigin="anonymous">
        </a-assets>

        <a-camera
            gps-camera
            rotation-reader>
        </a-camera>

        <!-- Menu card hawa mein float karega — camera ke 2 meter saamne -->
        <a-image
            src="#menu-image"
            position="0 0 -2"
            width="1.6"
            height="2.2"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-image>

    </a-scene>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 3000);
        });
    </script>

</body>
</html>
