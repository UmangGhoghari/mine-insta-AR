<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Menu</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; width: 100vw; height: 100vh; }

        #camera-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        a-scene {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            z-index: 2 !important;
            background: transparent !important;
        }

        a-scene canvas {
            background: transparent !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 70px; height: 70px;
            border: 5px solid rgba(255,255,255,0.15);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 28px;
            box-shadow: 0 0 30px rgba(167,139,250,0.4);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-text {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        #loading-subtext {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
        }

        #hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,12,41,0.85);
            color: #a78bfa;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 999;
            text-align: center;
            font-weight: 600;
            border: 1px solid rgba(167,139,250,0.3);
            backdrop-filter: blur(10px);
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        /* Vignette overlay for depth feel */
        #vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                transparent 50%,
                rgba(0,0,0,0.55) 100%);
        }

        #cam-btn {
            position: fixed;
            bottom: 80px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9998;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">✨ AR Menu Loading...</div>
        <div id="loading-subtext">Preparing your experience...</div>
    </div>

    <!-- Vignette for depth -->
    <div id="vignette"></div>

    <video id="camera-video" autoplay muted playsinline></video>
    <button id="cam-btn" onclick="window.arApp && window.arApp.requestCameraManually()">📷 Enable Camera</button>

    <a-scene
        id="ar-scene"
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; shadowMapEnabled: true;"
        background="color: transparent"
        embedded>

        <a-assets timeout="15000">
            <img id="menu-image"
                src="https://raw.githubusercontent.com/UmangGhoghari/mine-insta-AR/main/menu-image.jpg"
                crossorigin="anonymous">
        </a-assets>

        <a-entity camera position="0 0 0" look-controls="enabled: false"></a-entity>

        <!-- Ambient light — soft base -->
        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>

        <!-- Key light from top-left — creates depth shadow -->
        <a-light type="directional"
            color="#e8d5ff"
            intensity="1.2"
            position="-2 4 -1"
            cast-shadow="true">
        </a-light>

        <!-- Rim light from right — edge glow feel -->
        <a-light type="point"
            color="#7c3aed"
            intensity="1.5"
            position="3 1 -1.5"
            distance="8">
        </a-light>

        <!-- Back fill light — depth -->
        <a-light type="point"
            color="#1d4ed8"
            intensity="0.8"
            position="-3 -1 -3"
            distance="8">
        </a-light>

        <!-- SHADOW PLANE — fake shadow neeche floor pe -->
        <a-plane
            id="shadow-plane"
            position="0 -1.2 -2.2"
            rotation="-90 0 0"
            width="1.8" height="0.5"
            material="color: #000; opacity: 0.35; transparent: true; shader: flat;"
            animation__shadow="property: scale; from: 1 1 1; to: 0.92 0.92 1; dir: alternate; dur: 3200; easing: easeInOutSine; loop: true">
        </a-plane>

        <!-- GLOW BEHIND CARD — bloom effect fake -->
        <a-plane
            id="glow-bg"
            position="0 0 -2.35"
            width="1.7" height="2.3"
            material="color: #7c3aed; opacity: 0.18; transparent: true; shader: flat; side: double;">
        </a-plane>

        <!-- MAIN MENU CARD -->
        <a-image
            id="menu-card"
            src="#menu-image"
            position="0 0 -2.2"
            width="1.4"
            height="1.9"
            material="transparent: false; shader: flat; side: front;"

            animation__float="property: position;
                from: 0 -0.06 -2.2;
                to: 0 0.06 -2.2;
                dir: alternate;
                dur: 3000;
                easing: easeInOutSine;
                loop: true"

            animation__tiltY="property: rotation;
                from: -2 -6 0;
                to: 2 6 0;
                dir: alternate;
                dur: 4500;
                easing: easeInOutSine;
                loop: true"

            animation__scaleBreath="property: scale;
                from: 1 1 1;
                to: 1.015 1.015 1;
                dir: alternate;
                dur: 3000;
                easing: easeInOutSine;
                loop: true">
        </a-image>

        <!-- EDGE GLOW BORDER — white thin border for card depth -->
        <a-plane
            id="card-border"
            position="0 0 -2.21"
            width="1.45" height="1.95"
            material="color: #ffffff; opacity: 0.12; transparent: true; shader: flat;"
            animation__float2="property: position;
                from: 0 -0.06 -2.21;
                to: 0 0.06 -2.21;
                dir: alternate;
                dur: 3000;
                easing: easeInOutSine;
                loop: true"
            animation__tiltY2="property: rotation;
                from: -2 -6 0;
                to: 2 6 0;
                dir: alternate;
                dur: 4500;
                easing: easeInOutSine;
                loop: true">
        </a-plane>

    </a-scene>

    <div id="hint">✨ Drag to move &nbsp;|&nbsp; Pinch to zoom</div>

    <script>
    AFRAME.registerComponent('transparent-bg', {
        init: function () {
            const renderer = this.el.renderer;
            if (renderer) {
                renderer.setClearColor(0x000000, 0);
                renderer.autoClear = true;
            }
        }
    });

    class ARMenuApp {
        constructor() {
            this.scene     = document.getElementById('ar-scene');
            this.menuCard  = document.getElementById('menu-card');
            this.glowBg    = document.getElementById('glow-bg');
            this.shadow    = document.getElementById('shadow-plane');
            this.border    = document.getElementById('card-border');
            this.video     = document.getElementById('camera-video');
            this.loadingEl = document.getElementById('loading-screen');
            this.camBtn    = document.getElementById('cam-btn');

            this.isDragging = false;
            this.prevMouse  = { x: 0, y: 0 };
            this.prevTouch  = null;
            this.pinchDist  = null;

            window.arApp = this;
            this.init();
        }

        async init() {
            this.scene.setAttribute('transparent-bg', '');
            this.scene.addEventListener('loaded', () => this.patchRenderer());
            const ok = await this.startCamera();
            if (!ok) this.camBtn.style.display = 'block';
            this.setupControls();
            this.hideLoading();
        }

        patchRenderer() {
            try {
                const r = this.scene.renderer;
                if (r) { r.setClearColor(0x000000, 0); r.setClearAlpha(0); }
                if (this.scene.object3D) this.scene.object3D.background = null;
            } catch(e) {}
        }

        async startCamera() {
            if (!navigator.mediaDevices?.getUserMedia) return false;
            const constraints = [
                { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                { video: true, audio: false }
            ];
            for (const c of constraints) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(c);
                    this.video.srcObject = stream;
                    await new Promise(res => {
                        const t = setTimeout(res, 4000);
                        this.video.onloadedmetadata = () => { clearTimeout(t); res(); };
                    });
                    await this.video.play().catch(() => {});
                    return true;
                } catch(e) { console.warn(e); }
            }
            return false;
        }

        async requestCameraManually() {
            this.camBtn.style.display = 'none';
            const ok = await this.startCamera();
            if (!ok) this.camBtn.style.display = 'block';
        }

        // Sync glow + shadow position with card
        syncHelpers() {
            const pos = this.menuCard.getAttribute('position');
            const rot = this.menuCard.getAttribute('rotation');
            if (this.glowBg) this.glowBg.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z - 0.15 });
            if (this.border) this.border.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z + 0.01 });
            if (this.shadow) this.shadow.setAttribute('position', { x: pos.x, y: pos.y - 1.1, z: pos.z });
        }

        setupControls() {
            document.addEventListener('mousedown', (e) => {
                this.isDragging = true;
                this.prevMouse = { x: e.clientX, y: e.clientY };
            });
            document.addEventListener('mousemove', (e) => {
                if (!this.isDragging) return;
                const dx = e.clientX - this.prevMouse.x;
                const dy = e.clientY - this.prevMouse.y;
                this.moveCard(dx * 0.005, -dy * 0.005, 0);
                this.prevMouse = { x: e.clientX, y: e.clientY };
            });
            document.addEventListener('mouseup', () => this.isDragging = false);

            document.addEventListener('wheel', (e) => {
                e.preventDefault();
                this.scaleCard(e.deltaY > 0 ? 0.93 : 1.07);
            }, { passive: false });

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    this.prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    this.pinchDist = null;
                } else if (e.touches.length === 2) {
                    this.pinchDist = this.getTouchDist(e.touches);
                    this.prevTouch = null;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && this.prevTouch) {
                    const dx = e.touches[0].clientX - this.prevTouch.x;
                    const dy = e.touches[0].clientY - this.prevTouch.y;
                    this.moveCard(dx * 0.005, -dy * 0.005, 0);
                    this.prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else if (e.touches.length === 2 && this.pinchDist !== null) {
                    const newDist = this.getTouchDist(e.touches);
                    const factor = Math.max(0.85, Math.min(1.15, newDist / this.pinchDist));
                    this.scaleCard(factor);
                    this.pinchDist = newDist;
                }
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', () => {
                this.prevTouch = null;
                this.pinchDist = null;
            });
        }

        getTouchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        moveCard(x, y, z) {
            const pos = this.menuCard.getAttribute('position');
            this.menuCard.setAttribute('position', { x: pos.x + x, y: pos.y + y, z: pos.z + z });
            this.syncHelpers();
        }

        scaleCard(factor) {
            const s = this.menuCard.getAttribute('scale') || { x: 1, y: 1, z: 1 };
            const nx = Math.max(0.3, Math.min(4, s.x * factor));
            const ny = Math.max(0.3, Math.min(4, s.y * factor));
            this.menuCard.setAttribute('scale', { x: nx, y: ny, z: 1 });
            if (this.glowBg) this.glowBg.setAttribute('scale', { x: nx * 1.08, y: ny * 1.08, z: 1 });
            if (this.border) this.border.setAttribute('scale', { x: nx * 1.03, y: ny * 1.03, z: 1 });
        }

        resetCard() {
            this.menuCard.setAttribute('position', '0 0 -2.2');
            this.menuCard.setAttribute('rotation', '0 0 0');
            this.menuCard.setAttribute('scale', '1 1 1');
            this.syncHelpers();
        }

        hideLoading() {
            setTimeout(() => this.loadingEl.classList.add('hidden'), 1200);
        }
    }

    function boot() {
        if (typeof AFRAME !== 'undefined') new ARMenuApp();
        else window.addEventListener('load', () => new ARMenuApp());
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
    </script>

</body>
</html>
