<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Menu - WebXR Hand Tracking</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@handtracking/aframe-handtracking-component@latest/dist/aframe-handtracking-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            color: #fff;
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            padding: 0 30px;
            font-weight: bold;
        }
        #loading-subtext {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            text-align: center;
            padding: 0 30px;
        }
        #hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(102,126,234,0.9) 0%, rgba(118,75,162,0.9) 100%);
            color: #fff;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 999;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 998;
            max-width: 200px;
        }
        .control-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .control-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        #error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220,53,69,0.9);
            color: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 10000;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">🚀 AR Menu Loading...</div>
        <div id="loading-subtext">Initializing WebXR & Hand Tracking</div>
    </div>

    <div id="hint">📋 Menu dekh rahe ho! 👋 Hand gesture se control karo!</div>

    <div id="controls">
        <div class="control-item">
            <span class="control-icon">👆</span>
            <span>Point to move</span>
        </div>
        <div class="control-item">
            <span class="control-icon">✌️</span>
            <span>Peace to zoom</span>
        </div>
        <div class="control-item">
            <span class="control-icon">👍</span>
            <span>Thumb to rotate</span>
        </div>
        <div class="control-item">
            <span class="control-icon">✊</span>
            <span>Fist to reset</span>
        </div>
    </div>

    <div id="error-message">
        WebXR not supported. Please use Chrome/Edge on desktop or Android device.
    </div>

    <a-scene
        vr-mode-ui="enabled: true"
        renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
        background="color: #87CEEB"
        fog="type: linear; color: #87CEEB; near: 0; far: 20"
        id="scene">

        <a-assets timeout="10000">
            <img id="menu-image"
                src="./menu-image.jpg"
                crossorigin="anonymous">
        </a-assets>

        <!-- Environment -->
        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 -2 0" rotation="-90 0 0" width="20" height="20" 
                 color="#4a5568" shadow="receive: true"></a-plane>

        <!-- Lighting -->
        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" position="1 1 1" color="#ffffff" intensity="0.8" 
                 shadow="cast: true; shadowCameraVisible: false"></a-light>
        <a-light type="point" position="0 3 0" color="#ffd700" intensity="0.3"></a-light>

        <!-- Camera with hand tracking -->
        <a-camera 
            position="0 1.6 0"
            look-controls="pointerLockEnabled: false"
            cursor="fuse: false; rayOrigin: mouse">
        </a-camera>

        <!-- Hand tracking components -->
        <a-entity hand-tracking="hand: left"></a-entity>
        <a-entity hand-tracking="hand: right"></a-entity>

        <!-- Interactive Menu Card -->
        <a-image
            id="menu-card"
            src="#menu-image"
            position="0 1.5 -3"
            width="2.4"
            height="3.2"
            rotation="0 0 0"
            shadow="cast: true; receive: true"
            animation__hover="property: scale; to: 1.05 1.05 1; startEvents: mouseenter; dur: 200"
            animation__unhover="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
            animation__float="property: position; to: 0 1.7 -3; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true">
        </a-image>

        <!-- Floating particles for effect -->
        <a-entity id="particles">
            <a-sphere position="-1 2 -2" radius="0.05" color="#ffd700" 
                      animation="property: position; to: -1 2.5 -2; dir: alternate; dur: 2000; loop: true"></a-sphere>
            <a-sphere position="1 1.5 -4" radius="0.03" color="#ff69b4" 
                      animation="property: position; to: 1 2 -4; dir: alternate; dur: 2500; loop: true"></a-sphere>
            <a-sphere position="0 1 -5" radius="0.04" color="#00ff00" 
                      animation="property: position; to: 0 1.8 -5; dir: alternate; dur: 3000; loop: true"></a-sphere>
        </a-entity>

        <!-- Hand gesture indicators -->
        <a-entity id="gesture-indicator" position="0 2.5 -2" visible="false">
            <a-text value="✌️ Peace Gesture Detected!" 
                    color="#00ff00" 
                    width="4" 
                    align="center"
                    scale="0.5 0.5 0.5"></a-text>
        </a-entity>

    </a-scene>

    <script>
        // WebXR and Hand Tracking Controller
        class ARMenuController {
            constructor() {
                this.scene = document.querySelector('#scene');
                this.menuCard = document.querySelector('#menu-card');
                this.loadingScreen = document.querySelector('#loading-screen');
                this.errorMessage = document.querySelector('#error-message');
                this.gestureIndicator = document.querySelector('#gesture-indicator');
                this.hint = document.querySelector('#hint');
                
                this.isWebXRSupported = false;
                this.isHandTrackingSupported = false;
                
                this.init();
            }

            async init() {
                try {
                    // Check WebXR support
                    if ('xr' in navigator) {
                        this.isWebXRSupported = await navigator.xr.isSessionSupported('immersive-vr');
                        if (this.isWebXRSupported) {
                            console.log('WebXR VR supported');
                        }
                        
                        this.isHandTrackingSupported = await navigator.xr.isSessionSupported('immersive-vr');
                        console.log('Hand tracking support checked');
                    }

                    // Initialize scene
                    this.setupEventListeners();
                    this.setupHandGestureDetection();
                    this.setupMouseControls();
                    
                    // Hide loading screen
                    setTimeout(() => {
                        this.loadingScreen.classList.add('hidden');
                        this.updateHint();
                    }, 2000);

                } catch (error) {
                    console.error('Initialization error:', error);
                    this.showError('AR initialization failed. Please refresh and try again.');
                }
            }

            setupEventListeners() {
                // Scene events
                this.scene.addEventListener('loaded', () => {
                    console.log('Scene loaded successfully');
                });

                this.scene.addEventListener('enter-vr', () => {
                    console.log('Entered VR mode');
                    this.hint.textContent = '🥽 VR Mode! Use hand gestures or controllers!';
                });

                this.scene.addEventListener('exit-vr', () => {
                    console.log('Exited VR mode');
                    this.updateHint();
                });

                // Menu card interactions
                this.menuCard.addEventListener('click', () => {
                    this.animateMenuCard();
                });
            }

            setupHandGestureDetection() {
                // Simulate hand gesture detection with keyboard/mouse
                document.addEventListener('keydown', (event) => {
                    switch(event.key) {
                        case '1': // Point gesture
                            this.moveMenuCard(0.1, 0, 0);
                            this.showGestureIndicator('👆 Point Gesture');
                            break;
                        case '2': // Peace gesture (zoom)
                            this.zoomMenuCard(1.1);
                            this.showGestureIndicator('✌️ Peace - Zoom In');
                            break;
                        case '3': // Thumb gesture (rotate)
                            this.rotateMenuCard(15);
                            this.showGestureIndicator('👍 Thumb - Rotate');
                            break;
                        case '0': // Fist gesture (reset)
                            this.resetMenuCard();
                            this.showGestureIndicator('✊ Fist - Reset');
                            break;
                    }
                });
            }

            setupMouseControls() {
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };

                this.menuCard.addEventListener('mousedown', (event) => {
                    isDragging = true;
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                });

                document.addEventListener('mousemove', (event) => {
                    if (!isDragging) return;

                    const deltaX = event.clientX - previousMousePosition.x;
                    const deltaY = event.clientY - previousMousePosition.y;

                    const currentPosition = this.menuCard.getAttribute('position');
                    this.menuCard.setAttribute('position', {
                        x: currentPosition.x + deltaX * 0.01,
                        y: currentPosition.y - deltaY * 0.01,
                        z: currentPosition.z
                    });

                    previousMousePosition = { x: event.clientX, y: event.clientY };
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                // Mouse wheel for zoom
                document.addEventListener('wheel', (event) => {
                    if (event.target === this.menuCard) {
                        event.preventDefault();
                        const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
                        this.zoomMenuCard(zoomFactor);
                    }
                });
            }

            moveMenuCard(x, y, z) {
                const currentPos = this.menuCard.getAttribute('position');
                this.menuCard.setAttribute('position', {
                    x: currentPos.x + x,
                    y: currentPos.y + y,
                    z: currentPos.z + z
                });
            }

            zoomMenuCard(factor) {
                const currentScale = this.menuCard.getAttribute('scale') || { x: 1, y: 1, z: 1 };
                this.menuCard.setAttribute('scale', {
                    x: currentScale.x * factor,
                    y: currentScale.y * factor,
                    z: currentScale.z * factor
                });
            }

            rotateMenuCard(degrees) {
                const currentRotation = this.menuCard.getAttribute('rotation');
                this.menuCard.setAttribute('rotation', {
                    x: currentRotation.x,
                    y: currentRotation.y + degrees,
                    z: currentRotation.z
                });
            }

            resetMenuCard() {
                this.menuCard.setAttribute('position', '0 1.5 -3');
                this.menuCard.setAttribute('rotation', '0 0 0');
                this.menuCard.setAttribute('scale', '1 1 1');
            }

            animateMenuCard() {
                this.menuCard.setAttribute('animation__bounce', 'property: scale; to: 1.2 1.2 1; dur: 200; dir: alternate; loop: 2');
            }

            showGestureIndicator(gesture) {
                const textElement = this.gestureIndicator.querySelector('a-text');
                textElement.setAttribute('value', gesture);
                this.gestureIndicator.setAttribute('visible', true);
                
                setTimeout(() => {
                    this.gestureIndicator.setAttribute('visible', false);
                }, 2000);
            }

            updateHint() {
                if (this.isWebXRSupported) {
                    this.hint.textContent = '🥽 Click VR button for immersive experience!';
                } else {
                    this.hint.textContent = '📋 Menu dekh rahe ho! 🖱️ Drag to move, scroll to zoom!';
                }
            }

            showError(message) {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                this.loadingScreen.classList.add('hidden');
            }
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            new ARMenuController();
        });

        // Handle WebXR session
        document.querySelector('a-scene').addEventListener('enter-vr', function() {
            console.log('Entered VR mode - WebXR session started');
        });
    </script>

</body>
</html>
