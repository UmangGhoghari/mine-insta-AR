<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Menu - MindAR.js</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-text {
            color: #fff;
            font-size: 24px;
            text-align: center;
            margin-top: 30px;
            padding: 0 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a-scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">📷 Camera ko Menu Card pe point karo</div>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true;">

        <a-assets>
            <!-- ✅ FIX 1: path changed from ./assets/menu-image.jpg to ./menu-image.jpg -->
            <img id="menu-image" src="./menu-image.jpg" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image
                src="#menu-image"
                width="1"
                height="1.4"
                position="0 0 0"
                rotation="0 0 0">
                <!-- ✅ FIX 2: rotation was -90 0 0 (image flat pe gir rahi thi), ab 0 0 0 -->
            </a-image>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const scene = document.querySelector('a-scene');

            scene.addEventListener('arReady', () => {
                loadingScreen.classList.add('hidden');
            });
            scene.addEventListener('arError', () => {
                document.getElementById('loading-text').textContent = '❌ Camera access denied. Please allow camera permission.';
            });
            scene.addEventListener('arCameraPermissionRefused', () => {
                document.getElementById('loading-text').textContent = '❌ Camera permission required. Please refresh and allow camera access.';
            });
        });
    </script>

</body>
</html>
